apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mc
  template:
    metadata:
      labels:
        app: mc
    spec:
      nodeSelector:
        kubernetes.io/os: windows
      containers:
      - name: mc
        image: sampleacr.azurecr.io/managementconsole:v1
#        resources:
#          requests:
#            cpu: 100m
#            memory: 128Mi
#          limits:
#            cpu: 250m
#            memory: 256Mi
        ports:
        - containerPort: 8080
          name: mc
          
        env:
        - name: CONFIG_SECURITY_JDBCDRIVERUPLOAD
          value: ANY_HOST
        - name: CONTEXT_RESOURCE_VALIDATIONQUERY
          value: SELECT 1
        - name: CONTEXT_RESOURCE_USERNAME
          value: rpasqladmin
        - name: CONTEXT_RESOURCE_PASSWORD
          value: XXXXXXXXX
        - name: CONTEXT_RESOURCE_DRIVERCLASSNAME
          value: com.microsoft.sqlserver.jdbc.SQLServerDriver
        - name: CONTEXT_RESOURCE_URL
          value: jdbc:sqlserver://sample-sql-server.database.windows.net:1433;database=;user=rpasqladmin;password=<DB_PASSWORD>;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;3
          
      # LogDB setup
#        - name: SETTINGS_ENTRY_COUNT
#          value: 7
#        - name: SETTINGS_ENTRY_KEY_1
#          value: USE_LOGDB
#        - name: SETTINGS_ENTRY_VALUE_1
#          value: true
#        - name: SETTINGS_ENTRY_KEY_2
#          value: LOGDB_SCHEMA
#        - name: SETTINGS_ENTRY_VALUE_2
#          value: scheduler
#        - name: SETTINGS_ENTRY_KEY_3
#          value: LOGDB_HOST
#        - name: SETTINGS_ENTRY_VALUE_3
#          value: mysql:3306
#        - name: SETTINGS_ENTRY_KEY_4
#          value: LOGDB_TYPE
#        - name: SETTINGS_ENTRY_VALUE_4
#          value: MySQL Database
#        - name: SETTINGS_ENTRY_KEY_5
#          value: LOGDB_USERNAME
#        - name: SETTINGS_ENTRY_VALUE_5
#          value: scheduler
#        - name: SETTINGS_ENTRY_KEY_6
#          value: LOGDB_PASSWORD
#        - name: SETTINGS_ENTRY_VALUE_6
#          value: schedulerpassword
      # Base URL setup
        - name: SETTINGS_ENTRY_KEY_7
          value: BASE_URL
        - name: SETTINGS_ENTRY_VALUE_7
          value: http://localhost:8080
    
