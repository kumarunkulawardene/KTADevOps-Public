---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roboserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roboserver
  template:
    metadata:
      labels:
        app: roboserver
    spec:
      nodeSelector:
        kubernetes.io/os: windows
      containers:
      - name: roboserver
        image: sampleacr.azurecr.io/roboserver:v1
#        resources:
#          requests:
#            cpu: 100m
#            memory: 128Mi
#          limits:
#            cpu: 250m
#            memory: 256Mi
        env:
        - name: ROBOSERVER_SEC_ALLOW_FILE_SYSTEM_ACCESS
          value: true
        - name: ROBOSERVER_SEC_ACCEPT_JDBC_DRIVERS
          value: true
        - name: ROBOSERVER_ENABLE_MC_REGISTRATION
          value: true
        - name: ROBOSERVER_MC_URL
          value: http://mc:8080/
        - name: ROBOSERVER_MC_CLUSTER
          value: Production
        - name: ROBOSERVER_MC_USERNAME
          value: admin
        - name: ROBOSERVER_MC_PASSWORD
          value: admin
        - name: ROBOSERVER_ENABLE_SOCKET_SERVICE
          value: true
        - name: WRAPPER_MAX_MEMORY
          value: 2048
        ports:
        - containerPort: 50000
#        env:
#        - name: REDIS
#          value: "azure-vote-back"
---
apiVersion: v1
kind: Service
metadata:
  name: mc
spec:
  type: LoadBalancer
  ports:
  - port: 8080
  selector:
    app: mc