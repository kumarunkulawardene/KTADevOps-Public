kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: {{ .Values.deployment.environmentPrefix }}insight-data-azurefile
  namespace: {{ .Values.deployment.environmentPrefix }}kta
provisioner: kubernetes.io/azure-file
mountOptions:
  - dir_mode=0777
  - file_mode=0777
  - uid=<DB_USER>
  - gid=0
  - mfsymlinks
  - cache=strict
parameters:
  skuName: Standard_LRS
