# Default values for kta.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

deployment:
  environmentPrefix: "test-"
  # JG Azure Database Server (needs Firewall IP Rule...!)
  databaseServer: "sample-sql-server.database.windows.net" 
  databaseUserId: "<REPLACE_ME>"
  databasePassword: "<REPLACE_ME>"

role:
  # ROLE - scheduler
  scheduler:
    replicaCount: 1 
    cpu: 0.2
    cpulimit: 1
    containerport: 13640
  
  # ROLE - Web App Nodes
  web:
    replicaCount: 1 
    cpu: 0.5
    cpulimit: 1
    containerport: 80 
    frontendport: 8080
 
  

