apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.deployment.environmentPrefix }}kta-ingress
  namespace: {{ .Values.deployment.environmentPrefix }}kta
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/backend-protocol: https
    appgw.ingress.kubernetes.io/backend-hostname: "kofaxpstal"
    appgw.ingress.kubernetes.io/appgw-trusted-root-certificate: "kta-backend-tls"
    appgw.ingress.kubernetes.io/health-probe-path: "/TotalAgility/Services/SDK/UserService.svc"
spec:
  tls:
    - secretName: kta-tls-secret
      hosts:
        - kofaxpstal

  rules:
    - host: kofaxpstal
      http:
        paths:
          - path: '/'
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.deployment.environmentPrefix }}kta-webapp-service
                port: 
                  number: {{ .Values.role.webapp.port }}