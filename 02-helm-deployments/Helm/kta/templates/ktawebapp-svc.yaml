apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.deployment.environmentPrefix }}kta-webapp-service  
  namespace: {{ .Values.deployment.environmentPrefix }}kta  
spec:
  ports:
  - protocol: TCP
    port: {{ .Values.role.webapp.port }}
    targetPort: {{ .Values.role.webapp.port }}
  selector:
    app: {{ .Values.deployment.environmentPrefix }}kta-webapp
    