# Default values for kta.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

deployment:
  environmentPrefix: "test-"
  # SE Cloud DB Endpoint
  databaseServer: "sample-sql-server.database.windows.net" 
  databaseUserId: "<REPLACE_ME>"
  databasePassword: "<REPLACE_ME>"

role:
  # ROLE - License
  license:
    replicaCount: 0 
  
  # ROLE - Web App Nodes (incl. core worker)
  webapp:
    replicaCount: 0  
    ssl: true
    port: 443 
    authMode: "HTTPSManualLogon"

  # ROLE - Transformation
  transformation: 
    replicaCount: 0  
  

