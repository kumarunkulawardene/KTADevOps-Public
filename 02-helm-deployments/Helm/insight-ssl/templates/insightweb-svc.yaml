apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.deployment.environmentPrefix }}insight-web  
  namespace: {{ .Values.deployment.environmentPrefix }}kta  
spec:
  ports:
  - name: https
    protocol: TCP
    port: 443
    targetPort: 443
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
  selector:
    app: {{ .Values.deployment.environmentPrefix }}insight-web      