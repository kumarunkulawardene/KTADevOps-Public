# Default values for Insight deployment.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

deployment:
  environmentPrefix: ""
  # ExampleCustomer Azure Database Server (needs Firewall IP Rule...!)
  databaseServer: "sample-sql-server.database.windows.net" 
  databaseUserId: "<REPLACE_ME>"
  databasePassword: "<REPLACE_ME>"  
  reporsitory: "sampleacr.azurecr.io"

role:
  # ROLE - scheduler
  scheduler:
    image: insightscheduler
    imagetag: v6.4
    replicaCount: 1
    cpu: 0.2
    memory: 1024M
    cpulimit: 1
    memorylimit: 2048M
    containerport: 13640
    sharename: insight-data

  # ROLE - Web App Nodes
  web:
    image: insightwebssl
    imagetag: v6.4
    replicaCount: 1
    cpu: 0.5
    memory: 1024M
    cpulimit: 1
    memorylimit: 2048M
    sharename: insight-data