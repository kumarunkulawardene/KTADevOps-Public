apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.deployment.environmentPrefix }}kta-ingress
  namespace: {{ .Values.deployment.environmentPrefix }}kta
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/health-probe-path: "/TotalAgility/Services/SDK/ServerService.svc"
spec:
  rules:
    - http:
        paths:
          - path: '/'
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.deployment.environmentPrefix }}kta-webapp-service
                port: 
                  number: 80