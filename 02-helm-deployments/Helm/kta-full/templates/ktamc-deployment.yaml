apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployment.environmentPrefix }}ktamc-deployment
  namespace: {{ .Values.deployment.environmentPrefix }}kta  
spec:
  replicas: {{ .Values.role.mc.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.deployment.environmentPrefix }}kta-mc
  template:
    metadata:
      labels:
        app: {{ .Values.deployment.environmentPrefix }}kta-mc
    spec:
      nodeSelector:
        "kubernetes.io/os": windows
      containers:
      - name: ktamc
        image: sampleacr.azurecr.io/ktamessageconnector:v7.9
        resources:
          requests:
            cpu: {{ .Values.role.mc.cpu }}
            memory: {{ .Values.role.mc.memory }}
          limits:
            cpu: {{ .Values.role.mc.cpulimit }}
            memory: {{ .Values.role.mc.memorylimit }}
        ports:
        - containerPort: {{ .Values.role.mc.containerport }}
        envFrom:
          - configMapRef:
              name: kta-full-config
          - secretRef:
              name: kta-secrets-config
        readinessProbe:
          httpGet:
            path: /en/file/index.html
            port: 25086
          periodSeconds: 3
          timeoutSeconds: 60
        volumeMounts:
          - name: {{ .Values.deployment.environmentPrefix }}kta-mc-data-azurefile
            mountPath: "D:"
      volumes:
        - name: {{ .Values.deployment.environmentPrefix }}kta-mc-data-azurefile
          persistentVolumeClaim:
            claimName: kta-mc-azurefile-pvc

