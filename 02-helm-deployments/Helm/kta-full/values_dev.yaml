# Default values for kta.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

deployment:
  environmentPrefix: ""
  # JG Azure Database Server (needs Firewall IP Rule...!)
  databaseServer: "sample-sql-server.database.windows.net" 
  databaseUserId: "<REPLACE_ME>"
  databasePassword: "<REPLACE_ME>"

role:
  # ROLE - License
  license:
    replicaCount: 1 
    cpu: 0.3
    cpulimit: 1
    memory: 1000M
    memorylimit: 1000M
    containerport: 3581
  
  # ROLE - Web App Nodes (incl. core worker)
  webapp:
    replicaCount: 1 
    cpu: 1
    cpulimit: 2
    memory: 2000M
    memorylimit: 2000M   
    containerport: 80
    sharename: ktadata
 
  # ROLE - Transformation
  transformation: 
    replicaCount: 0 
    cpu: 1
    cpulimit: 2
    memory: 2000M
    memorylimit: 2000M
    containerport: 9001
    sharename: ktadata  
  
  # ROLE - Message Connector
  mc: 
    replicaCount: 0 
    cpu: 0.5
    cpulimit: 1
    memory: 2000M
    memorylimit: 2000M
    containerport: 25086
    sharename: ktadata  

  # ROLE - Reporting
  reporting: 
    replicaCount: 0
    cpu: 0.5
    cpulimit: 1
    memory: 2000M
    memorylimit: 2000M
    containerport: 80  
