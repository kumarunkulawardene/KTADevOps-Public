apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-kta
  namespace: kta  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aks-kta
  template:
    metadata:
      labels:
        app: aks-kta
    spec:
      nodeSelector:
        "beta.kubernetes.io/os": windows
      containers:
      - name: ktawebapp
        image: sampleacr.azurecr.io/ktawebappnolicense:v7.9
        resources:
          requests:
            cpu: '1'
            memory: 4Gi
          limits:
            cpu: '2'
            memory: 4Gi
        ports:
        - containerPort: 80
        envFrom:
          - configMapRef:
              name: ktawebapp-config-secure

        env:
          - name: KTA_CoreWorkerService--Agility.Server.Core.WorkerService.exe.config_MainDBConnectionString
            valueFrom:
              secretKeyRef:
                name: kta-connection-strings
                key: KTA_MainDB_ConnectionString

          - name: KTA_CoreWorkerService--Agility.Server.Core.WorkerService.exe.config_AuditDBConnectionString
            valueFrom:
              secretKeyRef:
                name: kta-connection-strings
                key: KTA_AuditDB_ConnectionString

          - name: KTA_CoreWorkerService--Agility.Server.Core.WorkerService.exe.config_ArchiveDBConnectionString
            valueFrom:
              secretKeyRef:
                name: kta-connection-strings
                key: KTA_FinishDB_ConnectionString

          - name: KTA_CoreWorkerService--Agility.Server.Core.WorkerService.exe.config_DataLayer
            valueFrom:
              secretKeyRef:
                name: kta-connection-strings
                key: KTA_DocsDB_ConnectionString

          - name: KTA_CoreWorkerService--Agility.Server.Core.WorkerService.exe.config_ReportingMainDBConnectionString
            valueFrom:
              secretKeyRef:
                name: kta-connection-strings
                key: KTA_ReportDB_ConnectionString

          - name: KTA_CoreWorkerService--Agility.Server.Core.WorkerService.exe.config_ReportingStagingDBConnectionString
            valueFrom:
              secretKeyRef:
                name: kta-connection-strings
                key: KTA_ReportStageDB_ConnectionString 

          - name: LicensingDatabase
