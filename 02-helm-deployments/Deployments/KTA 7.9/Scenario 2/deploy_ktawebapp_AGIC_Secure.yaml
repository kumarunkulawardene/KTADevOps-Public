apiVersion: v1
kind: Service
metadata:
  name: aks-kta  
  namespace: kta  
spec:
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  selector:
    app: aks-kta
---
# healthprobe path not being applied below - added readiness probe above and that works (don't know if below required)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aks-kta
  namespace: kta
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/health-probe-path: "/TotalAgility/Services/SDK/ServerService.svc"
spec:
  rules:
    - http:
        paths:
          - path: '/'
            pathType: Prefix
            backend:
              service:
                name: aks-kta
                port: 
                  number: 80
