apiVersion: v1
kind: PersistentVolume
metadata:
  name: insight-azurefile-pvc
  namespace: kta
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  azureFile:
    secretName: insight-share-secret
    shareName: insight-data
    readOnly: false
  mountOptions:
  - dir_mode=0777
  - file_mode=0777
  - uid=<DB_USER>
  - gid=1000
  - mfsymlinks
  - nobrl